<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>경마 DevTools</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ===== 상단 탭바 ===== */
.tab-bar { display: flex; background: #0f1629; border-bottom: 1px solid #333; padding: 0 8px; flex-shrink: 0; align-items: center; }
.tab-bar .title { font-size: 13px; color: #ffd700; font-weight: bold; margin-right: 16px; padding: 10px 4px; white-space: nowrap; }
.tab-bar button { padding: 10px 18px; border: none; background: none; color: #888; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.15s; }
.tab-bar button:hover { color: #ccc; background: rgba(255,255,255,0.03); }
.tab-bar button.active { color: #eee; border-bottom-color: #ffd700; }
.tab-bar .spacer { flex: 1; }
.tab-bar .status { font-size: 11px; color: #666; padding: 0 12px; }
.tab-bar .status.ok { color: #4CAF50; }

/* ===== 탭 콘텐츠 ===== */
.tab-content { flex: 1; overflow-y: auto; padding: 16px; display: none; }
.tab-content.active { display: block; }

/* ===== 공통 섹션 ===== */
.section { background: #16213e; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.section h2 { font-size: 13px; color: #888; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.section h2 .count { font-size: 11px; background: #0f3460; padding: 1px 6px; border-radius: 8px; color: #aaa; }
label { display: block; font-size: 12px; margin-bottom: 3px; color: #aaa; }
input, select { padding: 7px 10px; border-radius: 4px; border: 1px solid #333; background: #0f3460; color: #eee; font-size: 13px; }
input { width: 100%; margin-bottom: 6px; }
textarea { width: 100%; min-height: 80px; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #0f3460; color: #eee; font-size: 12px; font-family: monospace; resize: vertical; }
button { padding: 8px 14px; border: none; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.15s; }
button:hover { filter: brightness(1.15); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-green { background: #4CAF50; color: white; }
.btn-blue { background: #2196F3; color: white; }
.btn-orange { background: #FF9800; color: white; }
.btn-red { background: #f44336; color: white; }
.btn-purple { background: #9C27B0; color: white; }
.btn-ghost { background: rgba(255,255,255,0.06); color: #aaa; border: 1px solid #333; }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.flex-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

/* ===== 디버그 패널 ===== */
.room-chip { display: inline-block; padding: 5px 10px; background: #0f3460; border-radius: 4px; margin: 2px; cursor: pointer; font-size: 12px; transition: 0.15s; }
.room-chip:hover { background: #1a4a8a; }
.room-chip.selected { background: #2196F3; color: white; }
.bot-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.connecting { background: #666; }
.dot.connected { background: #FF9800; }
.dot.joined { background: #4CAF50; }
.dot.disconnected { background: #f44336; }
.dot.error { background: #f44336; }
.dot.timeout { background: #666; }
#debugLog { background: #0a0a1a; border-radius: 6px; padding: 10px; max-height: 240px; overflow-y: auto; font-family: monospace; font-size: 11px; line-height: 1.5; }
.log-info { color: #64b5f6; }
.log-ok { color: #81c784; }
.log-err { color: #e57373; }
.log-event { color: #fff176; }

/* ===== 글로우 토글 ===== */
.glow-cb { accent-color: #ffd700; vertical-align: middle; cursor: pointer; }
.glow-cb-label { font-size: 12px; color: #aaa; cursor: pointer; user-select: none; }

/* ===== 스프라이트 뷰어 ===== */
.sprite-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.sprite-toolbar label { margin: 0; }
.toolbar-check { display: inline-flex; align-items: center; gap: 4px; }
.toolbar-states { display: inline-flex; align-items: center; gap: 4px; }
.toolbar-states button { padding: 4px 9px; font-size: 11px; border: 1px solid #333; border-radius: 999px; background: #0f3460; color: #aaa; }
.toolbar-states button.active { background: #2196F3; color: #fff; border-color: #2196F3; }
.sprite-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.sprite-card { background: #16213e; border-radius: 8px; padding: 14px; }
.sprite-card.custom { border: 1px solid #ffd700; }
.sprite-card h3 { font-size: 13px; color: #ffd700; margin-bottom: 6px; }
.sprite-card h3 .badge { font-size: 10px; background: #ffd700; color: #1a1a2e; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
.state-badge-row { display: flex; gap: 6px; margin-bottom: 8px; }
.state-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid #333; color: #9db9ff; font-size: 11px; }
.frames-row { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
.frame-box { text-align: center; }
.frame-box .lbl { font-size: 10px; color: #555; margin-bottom: 3px; }
.preview { border: 1px solid #333; border-radius: 4px; padding: 6px; background: #0a0a1a; display: inline-block; }
.preview.with-bg {
    background-color: #0a0a1a;
    background-repeat: repeat-x;
    background-position: center;
    background-size: auto 100%;
    border-color: rgba(255,255,255,0.28);
}
.sprite-preview-stage {
    position: relative;
    width: 60px;
    height: 45px;
    overflow: visible;
    isolation: isolate;
    flex: 0 0 auto;
}
.transform-shell { width: 144px; }
.transform-preview { display: flex; align-items: center; justify-content: center; min-width: 84px; min-height: 68px; overflow: visible; padding: 6px; }
.transform-preview .transform-stage {
    position: relative;
    width: 60px;
    height: 45px;
    overflow: visible;
    isolation: isolate;
    transform-origin: center center;
    flex: 0 0 auto;
}
.transform-preview .preview-active-layer,
.transform-preview .preview-transition-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    transform-origin: center center;
    will-change: transform, opacity, filter;
}
.transform-preview .preview-active-layer { z-index: 2; }
.transform-preview .preview-transition-layer { z-index: 3; }
.transform-preview .preview-transition-flash {
    position: absolute;
    inset: -7px;
    border-radius: 999px;
    pointer-events: none;
    opacity: 0;
    z-index: 4;
    mix-blend-mode: screen;
}
.transform-preview .preview-transition-dust {
    position: absolute;
    left: 3px;
    right: 3px;
    bottom: -2px;
    height: 22px;
    pointer-events: none;
    opacity: 0;
    z-index: 1;
    transform-origin: center bottom;
}
.transform-preview .transform-stage.transform-to-power .preview-active-layer {
    animation: vehiclePowerIn 0.36s cubic-bezier(0.2, 0.85, 0.25, 1) both;
}
.transform-preview .transform-stage.transform-to-power .preview-transition-outgoing {
    animation: vehiclePowerOut 0.36s cubic-bezier(0.2, 0.2, 0.4, 1) both;
}
.transform-preview .transform-stage.transform-to-power .preview-transition-flash {
    background: radial-gradient(circle, rgba(255, 246, 184, 0.98) 0%, rgba(120, 245, 255, 0.58) 44%, rgba(255, 255, 255, 0) 82%);
    animation: vehiclePowerFlash 0.36s ease-out both;
}
.transform-preview .transform-stage.transform-to-base .preview-active-layer {
    animation: vehicleBaseIn 0.3s cubic-bezier(0.2, 0.8, 0.25, 1) both;
}
.transform-preview .transform-stage.transform-to-base .preview-transition-outgoing {
    animation: vehicleBaseOut 0.3s cubic-bezier(0.3, 0.2, 0.4, 1) both;
}
.transform-preview .transform-stage.transform-to-base .preview-transition-flash {
    background: radial-gradient(circle, rgba(255, 255, 255, 0.88) 0%, rgba(164, 210, 255, 0.35) 46%, rgba(255, 255, 255, 0) 80%);
    animation: vehicleBaseFlash 0.3s ease-out both;
}
.transform-preview .transform-stage.transform-to-fallen .preview-active-layer {
    animation: vehicleFallIn 0.42s cubic-bezier(0.18, 0.82, 0.22, 1) both;
}
.transform-preview .transform-stage.transform-to-fallen .preview-transition-outgoing {
    animation: vehicleFallOut 0.42s cubic-bezier(0.18, 0.3, 0.34, 1) both;
}
.transform-preview .transform-stage.transform-to-fallen .preview-transition-flash {
    background: radial-gradient(circle, rgba(244, 219, 158, 0.92) 0%, rgba(215, 194, 145, 0.52) 42%, rgba(255, 255, 255, 0) 80%);
    animation: vehicleFallFlash 0.42s ease-out both;
}
.transform-preview .transform-stage.transform-to-fallen .preview-transition-dust {
    animation: vehicleFallDust 0.48s ease-out both;
}
.transform-preview .transform-stage.transform-to-run .preview-active-layer {
    animation: vehicleRecoverIn 0.32s cubic-bezier(0.18, 0.8, 0.22, 1) both;
}
.transform-preview .transform-stage.transform-to-run .preview-transition-outgoing {
    animation: vehicleRecoverOut 0.32s cubic-bezier(0.2, 0.2, 0.34, 1) both;
}
.transform-preview .transform-stage.transform-to-run .preview-transition-flash {
    background: radial-gradient(circle, rgba(255, 255, 255, 0.82) 0%, rgba(182, 211, 255, 0.34) 46%, rgba(255, 255, 255, 0) 82%);
    animation: vehicleRecoverFlash 0.32s ease-out both;
}
.transform-actions { margin-top: 4px; display: flex; justify-content: center; gap: 4px; }
.transform-actions button { padding: 3px 7px; font-size: 10px; }
.no-svg { color: #f44336; font-size: 11px; }

@keyframes vehiclePowerIn {
    0% {
        opacity: 0.18;
        transform: translateX(-4px) scale(0.72) rotate(-6deg);
        filter: saturate(1.9) brightness(1.8) blur(1px);
    }
    55% {
        opacity: 1;
        transform: translateX(1px) scale(1.08) rotate(2deg);
        filter: saturate(1.2) brightness(1.22);
    }
    100% {
        opacity: 1;
        transform: translateX(0) scale(1) rotate(0);
        filter: none;
    }
}

@keyframes vehiclePowerOut {
    0% {
        opacity: 1;
        transform: translateX(0) scale(1) rotate(0);
        filter: none;
    }
    100% {
        opacity: 0;
        transform: translateX(5px) scale(1.18) rotate(6deg);
        filter: brightness(2.2) blur(2px);
    }
}

@keyframes vehiclePowerFlash {
    0% {
        opacity: 0;
        transform: scale(0.4);
    }
    32% {
        opacity: 0.95;
        transform: scale(1.06);
    }
    100% {
        opacity: 0;
        transform: scale(1.62);
    }
}

@keyframes vehicleBaseIn {
    0% {
        opacity: 0.2;
        transform: translateX(3px) scale(1.15) rotate(3deg);
        filter: brightness(1.35) blur(1px);
    }
    100% {
        opacity: 1;
        transform: translateX(0) scale(1) rotate(0);
        filter: none;
    }
}

@keyframes vehicleBaseOut {
    0% {
        opacity: 1;
        transform: translateX(0) scale(1) rotate(0);
        filter: none;
    }
    100% {
        opacity: 0;
        transform: translateX(-3px) scale(0.82) rotate(-4deg);
        filter: saturate(0.75) brightness(1.5) blur(1px);
    }
}

@keyframes vehicleBaseFlash {
    0% {
        opacity: 0;
        transform: scale(0.65);
    }
    38% {
        opacity: 0.7;
        transform: scale(1);
    }
    100% {
        opacity: 0;
        transform: scale(1.34);
    }
}

@keyframes vehicleFallIn {
    0% {
        opacity: 0.04;
        transform: translateX(12px) translateY(-7px) scale(0.76) rotate(-24deg);
        filter: brightness(1.24) saturate(1.2) blur(1.4px);
    }
    38% {
        opacity: 0.82;
        transform: translateX(4px) translateY(4px) scale(1.02) rotate(13deg);
        filter: brightness(1.08) saturate(1.06);
    }
    68% {
        opacity: 1;
        transform: translateX(-2px) translateY(2px) scale(1.06) rotate(7deg);
        filter: brightness(1.01);
    }
    100% {
        opacity: 1;
        transform: translateX(0) translateY(0) scale(1) rotate(0);
        filter: none;
    }
}

@keyframes vehicleFallOut {
    0% {
        opacity: 1;
        transform: translateX(0) translateY(0) scale(1) rotate(0);
        filter: none;
    }
    24% {
        opacity: 1;
        transform: translateX(5px) translateY(-2px) scale(1.02) rotate(-8deg);
        filter: brightness(1.06);
    }
    100% {
        opacity: 0;
        transform: translateX(13px) translateY(7px) scale(0.84) rotate(24deg);
        filter: brightness(0.94) blur(1.35px);
    }
}

@keyframes vehicleFallFlash {
    0% {
        opacity: 0;
        transform: scale(0.45) translateX(-2px);
    }
    26% {
        opacity: 0.94;
        transform: scale(1.08) translateX(4px);
    }
    100% {
        opacity: 0;
        transform: scale(1.72) translateX(10px);
    }
}

@keyframes vehicleRecoverIn {
    0% {
        opacity: 0.1;
        transform: translateX(-8px) translateY(4px) scale(0.8) rotate(-14deg);
        filter: brightness(1.16) blur(1px);
    }
    62% {
        opacity: 1;
        transform: translateX(2px) translateY(-2px) scale(1.04) rotate(4deg);
    }
    100% {
        opacity: 1;
        transform: translateX(0) translateY(0) scale(1) rotate(0);
        filter: none;
    }
}

@keyframes vehicleRecoverOut {
    0% {
        opacity: 1;
        transform: translateX(0) translateY(0) scale(1) rotate(0);
        filter: none;
    }
    42% {
        opacity: 0.84;
        transform: translateX(-3px) translateY(2px) scale(0.94) rotate(-6deg);
    }
    100% {
        opacity: 0;
        transform: translateX(-8px) translateY(-4px) scale(0.82) rotate(-14deg);
        filter: blur(1.1px);
    }
}

@keyframes vehicleRecoverFlash {
    0% {
        opacity: 0;
        transform: scale(0.6);
    }
    34% {
        opacity: 0.62;
        transform: scale(0.96);
    }
    100% {
        opacity: 0;
        transform: scale(1.24);
    }
}

@keyframes vehicleFallDust {
    0% {
        opacity: 0;
        transform: translateX(-4px) scale(0.45, 0.6);
        filter: blur(0px);
    }
    28% {
        opacity: 0.86;
        transform: translateX(3px) scale(1, 1);
        filter: blur(0.4px);
    }
    72% {
        opacity: 0.34;
        transform: translateX(11px) scale(1.28, 1.08);
        filter: blur(1px);
    }
    100% {
        opacity: 0;
        transform: translateX(17px) scale(1.5, 1.14);
        filter: blur(1.8px);
    }
}

/* 추가 패널 */
.add-panel { background: #16213e; border: 2px dashed #555; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.add-panel.open { border-color: #ffd700; }
.add-panel h2 { font-size: 14px; color: #ffd700; margin-bottom: 10px; cursor: pointer; user-select: none; }
.add-panel h2:hover { text-decoration: underline; }
.add-body { display: none; }
.add-body.open { display: block; }
.mode-btns { display: flex; gap: 4px; margin-bottom: 10px; }
.mode-btns button.active { background: #FF9800; color: white; border-color: #FF9800; }
.tab-btns { display: flex; gap: 3px; margin-bottom: 6px; }
.tab-btns button { padding: 3px 8px; font-size: 11px; border: 1px solid #333; border-radius: 3px 3px 0 0; background: #0f3460; color: #aaa; cursor: pointer; }
.tab-btns button.active { background: #2196F3; color: white; border-color: #2196F3; }
</style>
</head>
<body>

<!-- 탭바 -->
<div class="tab-bar">
    <div class="title">경마 DevTools</div>
    <button class="active" onclick="switchMainTab('debug')">Debug Panel</button>
    <button onclick="switchMainTab('sprites')">Sprite Viewer</button>
    <div class="spacer"></div>
    <div class="status" id="connStatus">disconnected</div>
</div>

<!-- ===== 탭1: 디버그 패널 ===== -->
<div class="tab-content active" id="tab-debug">
    <div class="section">
        <h2>Room <span class="count" id="roomCount">0</span></h2>
        <div id="roomList" style="margin-bottom:8px;min-height:24px"><span style="color:#555">로딩 중...</span></div>
        <div class="flex-row">
            <label style="margin:0;font-size:11px">봇 수</label>
            <input id="botCount" type="number" value="3" min="1" max="8" style="width:50px;margin:0">
            <button class="btn-ghost btn-sm" onclick="refreshRooms()">새로고침</button>
        </div>
    </div>

    <div class="section">
        <h2>Bots <span class="count" id="botCountBadge">0</span></h2>
        <div id="botList" style="min-height:20px"><span style="color:#555">봇 없음</span></div>
        <div class="flex-row" style="margin-top:8px">
            <button class="btn-green" onclick="joinBots()">입장</button>
            <button class="btn-blue" onclick="readyAll()">전원 준비</button>
            <button class="btn-orange" onclick="selectAllHorses()">전원 말 선택</button>
            <button class="btn-red btn-sm" onclick="disconnectAll()">전원 퇴장</button>
        </div>
    </div>

    <div class="section">
        <h2>Quick Actions</h2>
        <div class="flex-row">
            <button class="btn-green btn-sm" onclick="quickFlow()">원클릭: 입장+준비+선택</button>
            <button class="btn-blue btn-sm" onclick="readyAndSelect()">준비+선택</button>
        </div>
    </div>

    <div class="section">
        <h2>Log</h2>
        <div id="debugLog"></div>
    </div>
</div>

<!-- ===== 탭2: 스프라이트 뷰어 ===== -->
<div class="tab-content" id="tab-sprites">
    <!-- 추가 패널 (접힌 상태로 시작) -->
    <div class="add-panel" id="addPanel">
        <h2 onclick="toggleAddPanel()">+ 새 스프라이트 추가</h2>
        <div class="add-body" id="addBody">
            <div class="mode-btns">
                <button class="btn-ghost active" onclick="switchAddMode(this,'tabs')">프레임별 입력</button>
                <button class="btn-ghost" onclick="switchAddMode(this,'code')">코드 붙여넣기</button>
            </div>

            <!-- 프레임별 입력 -->
            <div id="modeTabsBody">
                <div class="flex-row" style="margin-bottom:8px">
                    <div><label>ID (영문)</label><input id="newId" placeholder="phoenix" style="width:140px"></div>
                </div>
                <div class="tab-btns">
                    <button class="active" onclick="switchSvgTab(this,'run-f1')">run f1</button>
                    <button onclick="switchSvgTab(this,'run-f2')">run f2</button>
                    <button onclick="switchSvgTab(this,'rest-f1')">rest f1</button>
                    <button onclick="switchSvgTab(this,'rest-f2')">rest f2</button>
                </div>
                <textarea id="svg-run-f1" placeholder='<svg viewBox="0 0 60 45" width="60" height="45">...</svg>'></textarea>
                <textarea id="svg-run-f2" style="display:none" placeholder="run frame2 SVG"></textarea>
                <textarea id="svg-rest-f1" style="display:none" placeholder="rest frame1 SVG"></textarea>
                <textarea id="svg-rest-f2" style="display:none" placeholder="rest frame2 SVG"></textarea>
                <div class="flex-row" style="margin-top:8px">
                    <button class="btn-orange" onclick="previewCustom()">미리보기</button>
                    <button class="btn-green" onclick="addCustom()">추가</button>
                    <button class="btn-purple" onclick="exportCustom()">코드 복사</button>
                </div>
            </div>

            <!-- 코드 붙여넣기 -->
            <div id="modeCodeBody" style="display:none">
                <label>JS 객체 코드 — <code style="background:#0a0a1a;padding:1px 4px;border-radius:2px;font-size:11px;color:#81c784">'id': { run: { frame1: \`...\` } }</code></label>
                <textarea id="codeInput" style="min-height:160px" placeholder="'eagle': {
    run: {
        frame1: `<svg ...>...</svg>`,
        frame2: `<svg ...>...</svg>`
    },
    rest: { ... }
},"></textarea>
                <div class="flex-row" style="margin-top:8px">
                    <button class="btn-orange" onclick="previewCode()">미리보기</button>
                    <button class="btn-green" onclick="addCode()">추가</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 뷰어 툴바 -->
    <div class="sprite-toolbar">
        <label>필터:</label>
        <select id="filterSelect"><option value="all">전체</option></select>
        <label>크기:</label>
        <label>variant:</label>
        <select id="variantSelect">
            <option value="base" selected>base</option>
            <option value="power">power</option>
        </select>
        <label>state:</label>
        <div class="toolbar-states" id="globalStateButtons">
            <button class="active" data-state="run" onclick="setGlobalSpriteState('run')">run</button>
            <button data-state="rest" onclick="setGlobalSpriteState('rest')">rest</button>
            <button data-state="fallen" onclick="setGlobalSpriteState('fallen')">fallen</button>
        </div>
        <select id="sizeSelect">
            <option value="1">1x</option>
            <option value="2" selected>2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
        </select>
        <span class="toolbar-check"><input type="checkbox" id="glowCheck" class="glow-cb" checked><label for="glowCheck" class="glow-cb-label">Glow</label></span>
        <span class="toolbar-check"><input type="checkbox" id="backgroundCheck" class="glow-cb" checked><label for="backgroundCheck" class="glow-cb-label">BG</label></span>
        <button class="btn-ghost btn-sm active" id="transformToggle" onclick="toggleTransformAnim()">base-power ON</button>
        <button class="btn-ghost btn-sm active" id="fallToggle" onclick="toggleFallAnim()">run-fallen ON</button>

<script>
// ===================================================================
//  공통
// ===================================================================
function switchMainTab(name) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelector(`.tab-bar button[onclick*="${name}"]`).classList.add('active');
}

// ===================================================================
//  디버그 패널
// ===================================================================
const bots = [];
const BOT_NAMES = ['Alpha','Bravo','Charlie','Delta','Echo','Fox','Golf','Hotel'];
let availableHorses = [];
let selectedRoomId = null;
let selectedRoomName = null;

function createNoopSocket() {
    return {
        on() { return this; },
        emit() {},
        disconnect() {}
    };
}

const socketIoAvailable = typeof io === 'function';
const controlSocket = socketIoAvailable ? io({ forceNew: true }) : createNoopSocket();
let roomsCache = [];

controlSocket.on('connect', () => {
    dlog('소켓 연결됨', 'ok');
    document.getElementById('connStatus').textContent = 'connected';
    document.getElementById('connStatus').className = 'status ok';
    controlSocket.emit('getRooms');
});
controlSocket.on('disconnect', () => {
    document.getElementById('connStatus').textContent = 'disconnected';
    document.getElementById('connStatus').className = 'status';
});
controlSocket.on('roomsList', r => { roomsCache = r; renderRooms(); });
controlSocket.on('roomsListUpdated', r => { roomsCache = r; renderRooms(); });

function refreshRooms() { controlSocket.emit('getRooms'); }

function renderRooms() {
    const el = document.getElementById('roomList');
    const rooms = roomsCache.filter(r => r.gameType === 'horse-race');
    document.getElementById('roomCount').textContent = rooms.length;
    if (rooms.length === 0) {
        el.innerHTML = '<span style="color:#555">경마 방 없음</span>';
        return;
    }
    el.innerHTML = rooms.map(r => {
        const sel = r.roomId === selectedRoomId ? ' selected' : '';
        const n = r.playerCount || 0;
        const st = r.isGameActive ? '진행' : '대기';
        return `<span class="room-chip${sel}" onclick="pickRoom('${r.roomId}','${r.roomName.replace(/'/g,"\\'")}')"><b>${r.roomName}</b> ${n}명 ${st}</span>`;
    }).join('');
}

function pickRoom(id, name) {
    selectedRoomId = id;
    selectedRoomName = name;
    dlog(`방 선택: ${name}`, 'info');
    renderRooms();
}

function dlog(msg, cls) {
    const el = document.getElementById('debugLog');
    const d = document.createElement('div');
    d.className = 'log-' + (cls || 'info');
    const t = new Date().toLocaleTimeString('ko-KR', { hour12: false });
    d.textContent = `[${t}] ${msg}`;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
}

if (!socketIoAvailable) {
    document.getElementById('connStatus').textContent = 'file preview';
    dlog('Socket.IO 없음: Sprite Viewer는 사용 가능, 봇 디버그는 서버 실행 시 사용', 'info');
}

function updateBotList() {
    const el = document.getElementById('botList');
    document.getElementById('botCountBadge').textContent = bots.length;
    if (bots.length === 0) { el.innerHTML = '<span style="color:#555">봇 없음</span>'; return; }
    el.innerHTML = bots.map(b =>
        `<div class="bot-row"><div class="dot ${b.status}"></div><span>${b.name}</span>` +
        `<span style="color:#555;font-size:11px">${b.status}${b.selectedHorse !== null ? ' / 말' + b.selectedHorse : ''}</span></div>`
    ).join('');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function joinBots() {
    if (!selectedRoomId) { dlog('방을 먼저 선택하세요', 'err'); return; }
    const n = parseInt(document.getElementById('botCount').value) || 3;
    dlog(`봇 ${n}명 → ${selectedRoomName}`, 'info');
    for (let i = 0; i < n; i++) {
        if (bots.length >= 8) break;
        try { await joinOneBot(BOT_NAMES[bots.length] || 'Bot' + bots.length); }
        catch (e) { dlog(`입장 실패: ${e}`, 'err'); }
        if (i < n - 1) await sleep(500);
    }
}

function joinOneBot(name) {
    return new Promise((resolve, reject) => {
        if (!socketIoAvailable) {
            reject('Socket.IO 없음: 서버로 열어야 봇 디버그 사용 가능');
            return;
        }
        const s = io({ forceNew: true });
        const bot = { socket: s, name, status: 'connecting', selectedHorse: null };
        bots.push(bot);
        updateBotList();

        const timeout = setTimeout(() => { bot.status = 'timeout'; dlog(`${name} 타임아웃`, 'err'); updateBotList(); reject('timeout'); }, 10000);

        s.on('connect', () => {
            bot.status = 'connected'; updateBotList();
            s.emit('joinRoom', {
                roomId: selectedRoomId, userName: name, isHost: false, password: '',
                deviceId: 'bot-' + Math.random().toString(36).slice(2),
                tabId: 'bot-' + Math.random().toString(36).slice(2)
            });
        });
        s.on('roomJoined', () => { clearTimeout(timeout); bot.status = 'joined'; dlog(`${name} 입장`, 'ok'); updateBotList(); resolve(); });
        s.on('roomError', m => { clearTimeout(timeout); bot.status = 'error'; dlog(`${name} 거부: ${JSON.stringify(m)}`, 'err'); updateBotList(); reject(m); });
        s.on('horseSelectionReady', d => { availableHorses = d.availableHorses || []; bot.selectedHorse = null; updateBotList(); });
        s.on('horseRaceStarted', d => {
            dlog(`${name} 경주시작 seeds:${d.speedSeeds ? 'O' : 'X'}`, 'event');
            // 실제 경주 애니메이션(15~30초)보다 늦게 보내야 호스트 화면에 영향 없음
            setTimeout(() => s.emit('raceAnimationComplete'), 60000);
        });
        s.on('horseRaceEnded', () => { bot.selectedHorse = null; updateBotList(); });
        s.on('horseRaceError', m => dlog(`${name} err: ${JSON.stringify(m)}`, 'err'));
        s.on('connect_error', e => { clearTimeout(timeout); bot.status = 'error'; dlog(`${name} 연결실패`, 'err'); updateBotList(); reject(e.message); });
        s.on('disconnect', () => { bot.status = 'disconnected'; updateBotList(); });
    });
}

function selectAllHorses() {
    const joined = bots.filter(b => b.status === 'joined');
    if (!joined.length) { dlog('입장한 봇 없음', 'err'); return; }
    joined.forEach((bot, i) => {
        const h = availableHorses.length > 0 ? availableHorses[i % availableHorses.length] : i;
        bot.socket.emit('selectHorse', { horseIndex: h });
        bot.selectedHorse = h;
    });
    dlog(`${joined.length}봇 말 선택 완료`, 'ok');
    updateBotList();
}

function readyAll() {
    const joined = bots.filter(b => b.status === 'joined');
    if (!joined.length) { dlog('입장한 봇 없음', 'err'); return; }
    joined.forEach(b => b.socket.emit('toggleReady'));
    dlog(`${joined.length}봇 준비`, 'ok');
}

function disconnectAll() {
    bots.forEach(b => b.socket.disconnect());
    bots.length = 0;
    availableHorses = [];
    dlog('전원 퇴장', 'info');
    updateBotList();
}

async function quickFlow() {
    await joinBots();
    await sleep(300);
    readyAll();
    await sleep(300);
    selectAllHorses();
}

async function readyAndSelect() {
    readyAll();
    await sleep(300);
    selectAllHorses();
}

function getSelectedVariant() {
    return document.getElementById('variantSelect')?.value || 'base';
}

function isGlowOn() {
    return document.getElementById('glowCheck')?.checked !== false;
}

function isBackgroundOn() {
    return document.getElementById('backgroundCheck')?.checked !== false;
}

function getVehicleBackgroundUrl(id) {
    if (!VEHICLE_IDS.includes(id)) return '';
    return `${VEHICLE_BACKGROUND_BASE}${id}.png?v=${VEHICLE_BACKGROUND_VERSION}`;
}

function getPreviewClass(id) {
    return isBackgroundOn() && getVehicleBackgroundUrl(id) ? 'preview with-bg' : 'preview';
}

function getPreviewBackgroundStyle(id) {
    const url = getVehicleBackgroundUrl(id);
    return isBackgroundOn() && url ? `background-image:url('${url}');` : '';
}

function getSpriteDataForVariant(id, variant, options = {}) {
    if (customSprites[id]) return customSprites[id];

    const respectGlow = options.respectGlow !== false;
    if (respectGlow && variant === 'power' && !isGlowOn()) {
        if (typeof getVehicleBaseSVG === 'function') return getVehicleBaseSVG(id);
        return getVehicleSVG(id);
    }

    if (typeof getVehicleVariantSVG === 'function') {
        return getVehicleVariantSVG(id, variant);
    }
    if (variant === 'base' && typeof getVehicleBaseSVG === 'function') {
        return getVehicleBaseSVG(id);
    }
    if (variant === 'power' && typeof getVehiclePowerSVG === 'function') {
        return getVehiclePowerSVG(id);
    }
    return getVehicleSVG(id);
}

function getSpriteData(id) {
    return getSpriteDataForVariant(id, getSelectedVariant(), { respectGlow: true });
}

function getStateFramesForVariant(id, state, variant, options = {}) {
    const data = getSpriteDataForVariant(id, variant, options);
    if (!data) return null;
    return data[state] || data.run || data.rest || data;
}

function getFrameMarkupForVariant(id, state, variant, frameNo = 1, options = {}) {
    const frames = getStateFramesForVariant(id, state, variant, options);
    if (!frames) return '';
    if (frameNo === 2) return frames.frame2 || frames.frame1 || '';
    return frames.frame1 || frames.frame2 || '';
}

function getDefaultSpriteState(data, requestedState = globalSpriteState) {
    if (!data || typeof data !== 'object') return 'run';
    if (requestedState && data[requestedState]) return requestedState;
    if (data.run) return 'run';
    if (data.rest) return 'rest';
    if (data.fallen) return 'fallen';
    const firstState = Object.keys(data).find(key => data[key] && typeof data[key] === 'object');
    return firstState || 'run';
}

function getFallMotionProfile(vehicleId) {
    const vehicleProfile = FALL_MOTION_PROFILES[vehicleId] || {};
    const category = vehicleProfile.category || FALL_MOTION_BASE_PROFILES.default.category;
    return {
        ...FALL_MOTION_BASE_PROFILES.default,
        ...(FALL_MOTION_BASE_PROFILES[category] || {}),
        ...vehicleProfile,
        slideX: FALL_TRAVEL_DISTANCE_PX,
        overshootX: FALL_OVERSHOOT_DISTANCE_PX
    };
}

function getFallFxPalette(profile) {
    return FALL_FX_PALETTES[profile.fxType] || FALL_FX_PALETTES.dust;
}

function buildFallOffsetKeyframes(profile, targetState) {
    const motionType = profile.motionType || 'faceplant';

    if (motionType === 'burst-stop') {
        if (targetState === 'fallen') {
            return [
                { x: 0, offset: 0 },
                { x: Math.max(0.8, profile.braceX * 0.7), offset: 0.1 },
                { x: profile.slideX * 0.24, offset: 0.28 },
                { x: profile.slideX * 0.78, offset: 0.74 },
                { x: profile.slideX, offset: 1 }
            ];
        }
        return [
            { x: profile.slideX, offset: 0 },
            { x: profile.slideX * 0.62, offset: 0.34 },
            { x: profile.slideX * 0.18, offset: 0.76 },
            { x: 0, offset: 1 }
        ];
    }

    if (motionType === 'arc-drop' || motionType === 'thrust-fade') {
        if (targetState === 'fallen') {
            return [
                { x: 0, offset: 0 },
                { x: Math.max(1.5, profile.braceX), offset: 0.16 },
                { x: profile.slideX * 0.34, offset: 0.42 },
                { x: profile.overshootX * 0.82, offset: 0.78 },
                { x: profile.slideX, offset: 1 }
            ];
        }
        return [
            { x: profile.slideX, offset: 0 },
            { x: profile.slideX * 0.7, offset: 0.26 },

            transform: `translate(${-Math.max(2, profile.slideX * 0.42)}px, ${Math.max(1, profile.dropY * 0.2)}px) scale(${Math.max(0.88, profile.outgoingScale + 0.04)}) rotate(${-profile.tiltDeg * 0.34}deg)`,
            filter: 'brightness(1.04)'
        },
        {
            offset: 1,
            opacity: 0,
            transform: `translate(${-Math.max(6, profile.slideX * 0.74)}px, ${-Math.max(2, profile.dropY * 0.5)}px) scale(${Math.max(0.76, profile.outgoingScale - 0.02)}) rotate(${-profile.tiltDeg * 0.72}deg)`,
            filter: 'blur(1.1px)'
        }
    ];
}

function buildRecoverIncomingKeyframes(profile) {
    const motionType = profile.motionType || 'faceplant';

    if (motionType === 'burst-stop') {
        return [
            {
                offset: 0,
                opacity: 0.08,
                transform: `translate(${Math.max(2, profile.slideX * 0.24)}px, ${Math.max(1, profile.dropY * 0.12)}px) scale(0.92, 0.96) rotate(${-Math.max(4, profile.tiltDeg * 0.12)}deg)`,
                filter: 'brightness(1.08) blur(0.9px)'
            },
            {
                offset: 0.62,
                opacity: 1,
                transform: `translate(0px, ${profile.reboundY * 0.12}px) scale(1.02, 0.98) rotate(0deg)`,
                filter: 'brightness(1.04)'
            },
            {
                offset: 1,
                opacity: 1,
                transform: 'translate(0px, 0px) scale(1, 1) rotate(0deg)',
                filter: 'none'
            }
        ];
    }

    return [
        {
            offset: 0,
            opacity: 0.08,
            transform: `translate(${Math.max(3, profile.slideX * 0.42)}px, ${Math.max(2, profile.dropY * 0.4)}px) scale(${Math.max(0.8, profile.incomingStartScale)}) rotate(${-profile.tiltDeg * 0.4}deg)`,
            filter: 'brightness(1.12) blur(1px)'
        },
        {
            offset: 0.64,
            opacity: 1,
            transform: `translate(1px, ${profile.reboundY * 0.45}px) scale(${Math.min(1.04, profile.impactScale - 0.01)}) rotate(${profile.tiltDeg * 0.08}deg)`,
            filter: 'brightness(1.04)'
        },
        {
            offset: 1,
            opacity: 1,
            transform: 'translate(0px, 0px) scale(1) rotate(0deg)',
            filter: 'none'
        }
    ];
}

function getFallFlashGradient(profile) {
    const palette = getFallFxPalette(profile);
    const radius = 80 + Math.round(profile.fxStrength * 14);
    return `radial-gradient(circle, ${palette.flashCore} 0%, ${palette.flashMid} 38%, rgba(255, 255, 255, 0) ${radius}%)`;
}

function getFallTrailBackground(profile) {
    return getFallFxPalette(profile).trail;
}

function setGlobalSpriteState(state) {
    globalSpriteState = state;
    document.querySelectorAll('#globalStateButtons button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.state === state);
    });
    renderSprites();
}

function allSpriteIds() { return [...VEHICLE_IDS, ...Object.keys(customSprites)]; }

function renderSprites() {
    const grid = document.getElementById('spriteGrid');
    const scale = parseInt(document.getElementById('sizeSelect').value);
    const filter = document.getElementById('filterSelect').value;
    grid.innerHTML = '';

    allSpriteIds().forEach(id => {
        if (filter !== 'all' && filter !== id) return;
        const data = getSpriteData(id);
        if (!data) return;
        const isCustom = !!customSprites[id];
        const state = getDefaultSpriteState(data, globalSpriteState);
        const frames = data[state] || {};
        const previewClass = getPreviewClass(id);
        const bgStyle = getPreviewBackgroundStyle(id);
        const framePreviewStyle = `${bgStyle}width:${(scale * 60) + 28}px;height:${(scale * 45) + 28}px;display:inline-flex;align-items:center;justify-content:center;overflow:hidden;`;
        const spriteStageStyle = `transform:scale(${scale});transform-origin:center center;`;
        const transformShellStyle = `${bgStyle}width:${(scale * 60) + 28}px;height:${(scale * 45) + 28}px`;
        const transitionAvailable = !!getFrameMarkupForVariant(id, state, 'base', 1, { respectGlow: false })
            && !!getFrameMarkupForVariant(id, state, 'power', 1, { respectGlow: false });
        const fallPreviewAvailable = !!getFrameMarkupForVariant(id, 'run', getSelectedVariant(), 1, { respectGlow: true })
            && !!getFrameMarkupForVariant(id, 'fallen', getSelectedVariant(), 1, { respectGlow: true });
        const badge = isCustom ? '<span class="badge">custom</span>' : '';
        const del = isCustom ? `<button class="btn-red btn-sm" style="float:right;padding:2px 6px;font-size:10px" onclick="removeCustom('${id}')">x</button>` : '';
        const transformMarkup = transitionAvailable
            ? `<div class="frame-box transform-shell">
                    <div class="lbl">base-power</div>
                    <div class="${previewClass} transform-preview" style="${transformShellStyle}">
                        <div class="transform-stage" data-vehicle="${id}" data-state="${state}" data-current-variant="base" data-scale="${scale}" data-offset-x="0" style="transform:translateX(0px) scale(${scale});transform-origin:center center;"></div>
                    </div>
                    <div class="transform-actions">
                        <button class="btn-ghost btn-sm" onclick="replayTransformFromButton(this)">replay</button>
                    </div>
               </div>`
            : `<div class="frame-box transform-shell">
                    <div class="lbl">base-power</div>
                    <div class="${previewClass} transform-preview" style="${transformShellStyle}">
                        <span class="no-svg">n/a</span>
                    </div>
               </div>`;
        const fallMarkup = fallPreviewAvailable
            ? `<div class="frame-box transform-shell">
                    <div class="lbl">run-fallen</div>
                    <div class="${previewClass} transform-preview" style="${transformShellStyle}">
                        <div class="transform-stage fall-stage" data-vehicle="${id}" data-current-state="run" data-scale="${scale}" data-offset-x="0" style="transform:translateX(0px) scale(${scale});transform-origin:center center;"></div>
                    </div>
                    <div class="transform-actions">
                        <button class="btn-ghost btn-sm" onclick="replayFallFromButton(this)">replay</button>
                    </div>
               </div>`
            : `<div class="frame-box transform-shell">
                    <div class="lbl">run-fallen</div>
                    <div class="${previewClass} transform-preview" style="${transformShellStyle}">
                        <span class="no-svg">n/a</span>
                    </div>
               </div>`;

        const card = document.createElement('div');
        card.className = 'sprite-card' + (isCustom ? ' custom' : '');
        card.dataset.id = id;
        card.dataset.state = state;
        card.innerHTML = `
            <h3>${id}${badge}${del}</h3>
            <div class="state-badge-row">
                <span class="state-badge">global state: ${state}</span>
            </div>
            <div class="frames-row">
                <div class="frame-box"><div class="lbl">frame1</div><div class="${previewClass}" data-frame="1" style="${framePreviewStyle}"><div class="sprite-preview-stage" style="${spriteStageStyle}">${frames.frame1||'<span class="no-svg">-</span>'}</div></div></div>
                <div class="frame-box"><div class="lbl">frame2</div><div class="${previewClass}" data-frame="2" style="${framePreviewStyle}"><div class="sprite-preview-stage" style="${spriteStageStyle}">${frames.frame2||'<span class="no-svg">-</span>'}</div></div></div>
                <div class="frame-box"><div class="lbl">anim</div><div class="${previewClass}" style="${framePreviewStyle}"><div class="sprite-preview-stage animated" data-vehicle="${id}" data-state="${state}" style="${spriteStageStyle}">${frames.frame1||''}</div></div></div>
                ${transformMarkup}
                ${fallMarkup}
            </div>`;
        grid.appendChild(card);
        card.querySelectorAll('.transform-stage:not(.fall-stage)').forEach(syncTransformPreviewStage);
        card.querySelectorAll('.fall-stage').forEach(syncFallPreviewStage);
    });
    updateFilterOpts();
}

function ensureTransformActiveLayer(stage) {
    if (!stage) return null;
    let layer = stage.querySelector('.preview-active-layer');
    if (!layer) {
        layer = document.createElement('div');
        layer.className = 'preview-active-layer';
        stage.appendChild(layer);
    }
    return layer;
}

function setPreviewStageOffset(stage, offsetX = 0) {
    if (!stage) return;
    const scale = parseFloat(stage.dataset.scale || '1') || 1;
    const normalizedOffset = Number.isFinite(offsetX) ? offsetX : 0;
    stage.dataset.offsetX = String(normalizedOffset);
    stage.style.transform = `translateX(${normalizedOffset}px) scale(${scale})`;
    stage.style.transformOrigin = 'center center';
}

function animatePreviewStageOffset(stage, targetOffsetX, duration, easing, keyframeOffsets = null) {
    if (!stage) return;
    const scale = parseFloat(stage.dataset.scale || '1') || 1;
    const sourceOffsetX = parseFloat(stage.dataset.offsetX || '0') || 0;
    const normalizedTarget = Number.isFinite(targetOffsetX) ? targetOffsetX : 0;
    const fromTransform = `translateX(${sourceOffsetX}px) scale(${scale})`;
    const toTransform = `translateX(${normalizedTarget}px) scale(${scale})`;

    if (stage._motionAnimation) {
        stage._motionAnimation.cancel();
        stage._motionAnimation = null;
    }

    stage.dataset.offsetX = String(normalizedTarget);
    stage.style.transformOrigin = 'center center';
    stage.style.transform = toTransform;

    if (typeof stage.animate === 'function' && sourceOffsetX !== normalizedTarget) {
        const keyframes = Array.isArray(keyframeOffsets) && keyframeOffsets.length
            ? keyframeOffsets.map(entry => {
                const offsetValue = typeof entry === 'number' ? entry : entry?.x;
                const animationOffset = Number.isFinite(offsetValue) ? offsetValue : normalizedTarget;
                const frame = {
                    transform: `translateX(${animationOffset}px) scale(${scale})`
                };
                if (entry && typeof entry === 'object' && Number.isFinite(entry.offset)) frame.offset = entry.offset;
                return frame;
            })
            : [
                { transform: fromTransform },
                { transform: toTransform }
            ];
        stage._motionAnimation = stage.animate(
            keyframes,
            {
                duration,
                easing,
                fill: 'forwards'
            }
        );
        stage._motionAnimation.onfinish = () => {
            stage.style.transform = toTransform;
            stage._motionAnimation = null;
        };
        stage._motionAnimation.oncancel = () => {
            stage.style.transform = toTransform;
            stage._motionAnimation = null;
        };
    }
}

function clearTransformPreviewStage(stage, options = {}) {
    if (!stage) return;
    const cancelReturnTimer = options.cancelReturnTimer !== false;
    [stage, ...stage.querySelectorAll('*')].forEach(node => {
        if (typeof node.getAnimations === 'function') {
            node.getAnimations().forEach(animation => animation.cancel());
        }
    });
    if (stage._transformCleanupTimer) {
        clearTimeout(stage._transformCleanupTimer);
        stage._transformCleanupTimer = null;
    }
    if (stage._fallCleanupTimer) {
        clearTimeout(stage._fallCleanupTimer);
        stage._fallCleanupTimer = null;
    }
    if (stage._motionAnimation) {
        stage._motionAnimation.cancel();
        stage._motionAnimation = null;
    }
    if (cancelReturnTimer && stage._transformReturnTimer) {
        clearTimeout(stage._transformReturnTimer);
        stage._transformReturnTimer = null;
    }
    if (cancelReturnTimer && stage._fallReturnTimer) {
        clearTimeout(stage._fallReturnTimer);
        stage._fallReturnTimer = null;
    }
    stage.dataset.transitioning = '0';
    stage.classList.remove('transform-to-power', 'transform-to-base', 'transform-to-fallen', 'transform-to-run');
    stage.querySelectorAll('.preview-transition-layer, .preview-transition-flash, .preview-transition-dust').forEach(node => node.remove());
}

function syncTransformPreviewStage(stage) {
    if (!stage || stage.dataset.transitioning === '1') return;
    if (stage.classList.contains('fall-stage')) return;
    const variant = stage.dataset.currentVariant || 'base';
    const markup = getFrameMarkupForVariant(
        stage.dataset.vehicle,
        stage.dataset.state || 'run',
        variant,
        spriteFrame,
        { respectGlow: false }
    );
    const activeLayer = ensureTransformActiveLayer(stage);
    activeLayer.innerHTML = markup || '<span class="no-svg">-</span>';
}

function syncFallPreviewStage(stage) {
    if (!stage || stage.dataset.transitioning === '1') return;
    setPreviewStageOffset(stage, parseFloat(stage.dataset.offsetX || '0') || 0);
    const markup = getFrameMarkupForVariant(
        stage.dataset.vehicle,
        stage.dataset.currentState || 'run',
        getSelectedVariant(),
        spriteFrame,
        { respectGlow: true }
    );
    const activeLayer = ensureTransformActiveLayer(stage);
    activeLayer.innerHTML = markup || '<span class="no-svg">-</span>';
}

function playNodeAnimation(node, keyframes, options) {
    if (!node || typeof node.animate !== 'function') return null;
    return node.animate(keyframes, {
        fill: 'forwards',
        ...options
    });
}

function animateTransformPreviewStage(stage, targetVariant) {
    if (!stage) return;

    const vehicleId = stage.dataset.vehicle;
    const state = stage.dataset.state || 'run';
    const sourceVariant = stage.dataset.currentVariant || 'base';
    const sourceMarkup = getFrameMarkupForVariant(vehicleId, state, sourceVariant, spriteFrame, { respectGlow: false });
    const targetMarkup = getFrameMarkupForVariant(vehicleId, state, targetVariant, spriteFrame, { respectGlow: false });
    if (!sourceMarkup || !targetMarkup) return;

    clearTransformPreviewStage(stage);

    const activeLayer = ensureTransformActiveLayer(stage);
    activeLayer.innerHTML = targetMarkup;

    const outgoingLayer = document.createElement('div');
    outgoingLayer.className = 'preview-transition-layer preview-transition-outgoing';
    outgoingLayer.innerHTML = sourceMarkup;
    stage.appendChild(outgoingLayer);

    const flash = document.createElement('div');
    flash.className = 'preview-transition-flash';
    stage.appendChild(flash);

    stage.dataset.currentVariant = targetVariant;
    stage.dataset.transitioning = '1';

    const className = targetVariant === 'power' ? 'transform-to-power' : 'transform-to-base';
    const duration = targetVariant === 'power' ? TRANSFORM_PREVIEW_SWAP_MS : 300;
    void stage.offsetWidth;
    stage.classList.add(className);
    stage._transformCleanupTimer = setTimeout(() => {
        clearTransformPreviewStage(stage, { cancelReturnTimer: false });
        syncTransformPreviewStage(stage);
    }, duration + 40);
}

function animateFallPreviewStage(stage, targetState) {
    if (!stage) return;

    const vehicleId = stage.dataset.vehicle;
    const profile = getFallMotionProfile(vehicleId);
    const variant = getSelectedVariant();
    const sourceState = stage.dataset.currentState || 'run';
    const sourceMarkup = getFrameMarkupForVariant(vehicleId, sourceState, variant, spriteFrame, { respectGlow: true });
    const targetMarkup = getFrameMarkupForVariant(vehicleId, targetState, variant, spriteFrame, { respectGlow: true });
    if (!sourceMarkup || !targetMarkup) return;

    clearTransformPreviewStage(stage);

    const activeLayer = ensureTransformActiveLayer(stage);
    activeLayer.innerHTML = targetMarkup;

    const outgoingLayer = document.createElement('div');
    outgoingLayer.className = 'preview-transition-layer preview-transition-outgoing';
    outgoingLayer.innerHTML = sourceMarkup;
    stage.appendChild(outgoingLayer);

    const flash = document.createElement('div');
    flash.className = 'preview-transition-flash';
    flash.style.background = getFallFlashGradient(profile);
    stage.appendChild(flash);

    let trail = null;
    if (targetState === 'fallen') {
        trail = document.createElement('div');
        trail.className = 'preview-transition-dust';
        trail.style.background = getFallTrailBackground(profile);
        trail.style.bottom = profile.fxType === 'smoke' || profile.fxType === 'wind' ? '2px' : '-2px';
        trail.style.height = profile.fxType === 'feather' ? '26px' : profile.fxType === 'splash' ? '18px' : '22px';
        stage.appendChild(trail);
    }

    stage.dataset.currentState = targetState;
    stage.dataset.transitioning = '1';

    const duration = targetState === 'fallen' ? profile.fallMs : profile.recoverMs;
    const targetOffsetX = targetState === 'fallen' ? profile.slideX : 0;
    animatePreviewStageOffset(
        stage,
        targetOffsetX,
        duration,
        targetState === 'fallen'
            ? 'cubic-bezier(0.16, 0.82, 0.22, 1)'
            : 'cubic-bezier(0.22, 0.74, 0.3, 1)',
        buildFallOffsetKeyframes(profile, targetState)
    );

    if (targetState === 'fallen') {
        playNodeAnimation(outgoingLayer, buildFallOutgoingKeyframes(profile), {
            duration,
            easing: 'cubic-bezier(0.18, 0.3, 0.34, 1)'
        });
        playNodeAnimation(activeLayer, buildFallIncomingKeyframes(profile), {
            duration,
            easing: 'cubic-bezier(0.18, 0.82, 0.22, 1)'
        });
        playNodeAnimation(flash, [
            { offset: 0, opacity: 0, transform: 'scale(0.42) translateX(-2px)' },
            { offset: 0.28, opacity: Math.min(0.48 + (profile.fxStrength * 0.56), 0.96), transform: `scale(${1 + (profile.fxStrength * 0.18)}) translateX(${Math.round(profile.slideX * 0.2)}px)` },
            { offset: 1, opacity: 0, transform: `scale(${1.52 + (profile.fxStrength * 0.3)}) translateX(${Math.round(profile.slideX * 0.75)}px)` }
        ], {
            duration,
            easing: 'ease-out'
        });
        if (trail) {
            playNodeAnimation(trail, [
                { offset: 0, opacity: 0, transform: `translateX(${-Math.max(4, profile.braceX * 2)}px) scale(0.45, 0.62)`, filter: 'blur(0px)' },
                { offset: 0.28, opacity: Math.min(0.44 + (profile.fxStrength * 0.58), 0.94), transform: `translateX(${Math.round(profile.slideX * 0.2)}px) scale(1, 1)`, filter: 'blur(0.5px)' },
                { offset: 0.72, opacity: Math.max(0.18, profile.fxStrength * 0.46), transform: `translateX(${Math.round(profile.overshootX * 0.76)}px) scale(${1.12 + (profile.fxStrength * 0.26)}, ${1.02 + (profile.fxStrength * 0.16)})`, filter: 'blur(1px)' },
                { offset: 1, opacity: 0, transform: `translateX(${Math.round(profile.slideX + (profile.fxStrength * 10))}px) scale(${1.34 + (profile.fxStrength * 0.3)}, ${1.08 + (profile.fxStrength * 0.18)})`, filter: 'blur(1.7px)' }
            ], {
                duration: duration + 40,
                easing: 'ease-out'
            });
        }
    } else {
        playNodeAnimation(outgoingLayer, buildRecoverOutgoingKeyframes(profile), {
            duration,
            easing: 'cubic-bezier(0.22, 0.2, 0.34, 1)'
        });
        playNodeAnimation(activeLayer, buildRecoverIncomingKeyframes(profile), {
            duration,
            easing: 'cubic-bezier(0.22, 0.78, 0.28, 1)'
        });
        playNodeAnimation(flash, [
            { offset: 0, opacity: 0, transform: 'scale(0.56)' },
            { offset: 0.34, opacity: 0.32 + (profile.fxStrength * 0.24), transform: 'scale(0.96)' },
            { offset: 1, opacity: 0, transform: 'scale(1.26)' }
        ], {
            duration,
            easing: 'ease-out'
        });
    }

    stage._fallCleanupTimer = setTimeout(() => {
        clearTransformPreviewStage(stage, { cancelReturnTimer: false });
        syncFallPreviewStage(stage);
    }, duration + 40);
}

function replayTransformStage(stage) {
    if (!stage || stage.dataset.transitioning === '1') return;
    clearTransformPreviewStage(stage);
    stage.dataset.currentVariant = 'base';
    syncTransformPreviewStage(stage);
    animateTransformPreviewStage(stage, 'power');
    stage._transformReturnTimer = setTimeout(() => {
        stage._transformReturnTimer = null;
        animateTransformPreviewStage(stage, 'base');
    }, TRANSFORM_PREVIEW_RETURN_DELAY_MS);
}

function replayTransformFromButton(btn) {
    const stage = btn.closest('.transform-shell')?.querySelector('.transform-stage');
    replayTransformStage(stage);
}

function replayFallStage(stage) {
    if (!stage || stage.dataset.transitioning === '1') return;
    clearTransformPreviewStage(stage);
    stage.dataset.currentState = 'run';
    setPreviewStageOffset(stage, 0);
    syncFallPreviewStage(stage);
    animateFallPreviewStage(stage, 'fallen');
    stage._fallReturnTimer = setTimeout(() => {
        stage._fallReturnTimer = null;
        animateFallPreviewStage(stage, 'run');
    }, FALL_PREVIEW_RETURN_DELAY_MS);
}

function replayFallFromButton(btn) {
    const stage = btn.closest('.transform-shell')?.querySelector('.fall-stage');
    replayFallStage(stage);
}

function replayVisibleFalls() {
    document.querySelectorAll('.fall-stage').forEach(replayFallStage);
}

function replayVisibleTransforms() {
    document.querySelectorAll('.transform-stage:not(.fall-stage)').forEach(replayTransformStage);
}

function replayAllVisiblePreviews() {
    replayVisibleTransforms();
    replayVisibleFalls();
}

function updateFilterOpts() {
    const sel = document.getElementById('filterSelect');
    const cur = sel.value;
    sel.innerHTML = '<option value="all">전체</option>';
    allSpriteIds().forEach(id => {
        const o = document.createElement('option');
        o.value = id; o.textContent = id + (customSprites[id] ? ' *' : '');
        sel.appendChild(o);
    });
    sel.value = cur;
}

function spriteAnimTick() {
    spriteFrame = spriteFrame === 1 ? 2 : 1;
    document.querySelectorAll('.animated').forEach(el => {
        const d = getSpriteData(el.dataset.vehicle);
        const state = getDefaultSpriteState(d, el.dataset.state || globalSpriteState);
        const f = d?.[state];
        const svg = spriteFrame === 1 ? f?.frame1 : f?.frame2;
        if (svg) el.innerHTML = svg;
    });
    document.querySelectorAll('.transform-stage:not(.fall-stage)').forEach(syncTransformPreviewStage);
    document.querySelectorAll('.fall-stage').forEach(syncFallPreviewStage);
}

function toggleAnim() {
    spriteAnimating = !spriteAnimating;
    const btn = document.getElementById('animToggle');
    btn.classList.toggle('active', spriteAnimating);
    btn.textContent = spriteAnimating ? 'anim ON' : 'anim OFF';
    if (spriteAnimating) spriteInterval = setInterval(spriteAnimTick, 300);
    else clearInterval(spriteInterval);
}

function toggleTransformAnim() {
    transformAnimating = !transformAnimating;
    const btn = document.getElementById('transformToggle');
    btn.textContent = transformAnimating ? 'base-power ON' : 'base-power OFF';
    btn.classList.toggle('active', transformAnimating);
    if (transformAnimating) {
        replayVisibleTransforms();
        transformInterval = setInterval(replayVisibleTransforms, TRANSFORM_PREVIEW_LOOP_MS);
    } else {
        clearInterval(transformInterval);
        transformInterval = null;
        document.querySelectorAll('.transform-stage:not(.fall-stage)').forEach(stage => {
            clearTransformPreviewStage(stage);
            stage.dataset.currentVariant = 'base';
            syncTransformPreviewStage(stage);
        });
    }
}

function toggleFallAnim() {
    fallAnimating = !fallAnimating;
    const btn = document.getElementById('fallToggle');
    btn.textContent = fallAnimating ? 'run-fallen ON' : 'run-fallen OFF';
    btn.classList.toggle('active', fallAnimating);
    if (fallAnimating) {
        replayVisibleFalls();
        fallInterval = setInterval(replayVisibleFalls, FALL_PREVIEW_LOOP_MS);
    } else {
        clearInterval(fallInterval);
        fallInterval = null;
        document.querySelectorAll('.fall-stage').forEach(stage => {
            clearTransformPreviewStage(stage);
            stage.dataset.currentState = 'run';
            setPreviewStageOffset(stage, 0);
            syncFallPreviewStage(stage);
        });
    }
}

// 추가 패널
function toggleAddPanel() {
    const body = document.getElementById('addBody');
    const panel = document.getElementById('addPanel');
    const open = body.classList.toggle('open');
    panel.classList.toggle('open', open);
}

function switchAddMode(btn, mode) {
    btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('modeTabsBody').style.display = mode === 'tabs' ? '' : 'none';
    document.getElementById('modeCodeBody').style.display = mode === 'code' ? '' : 'none';
}

function switchSvgTab(btn, tabId) {
    btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['run-f1','run-f2','rest-f1','rest-f2'].forEach(id => {
        document.getElementById('svg-' + id).style.display = id === tabId ? '' : 'none';
    });
}

function readSvgInputs() {
    return {
        id: document.getElementById('newId').value.trim(),
        run: { frame1: document.getElementById('svg-run-f1').value.trim(), frame2: document.getElementById('svg-run-f2').value.trim() },
        rest: { frame1: document.getElementById('svg-rest-f1').value.trim(), frame2: document.getElementById('svg-rest-f2').value.trim() }
    };
}

function buildSpriteData(input) {
    const data = {};
    if (input.run.frame1 || input.run.frame2) data.run = { frame1: input.run.frame1 || input.run.frame2, frame2: input.run.frame2 || input.run.frame1 };
    if (input.rest.frame1 || input.rest.frame2) data.rest = { frame1: input.rest.frame1 || input.rest.frame2, frame2: input.rest.frame2 || input.rest.frame1 };
    return (data.run || data.rest) ? data : null;
}

function previewCustom() {
    const input = readSvgInputs();
    const data = buildSpriteData(input);
    if (!data) { alert('SVG를 하나 이상 입력하세요'); return; }
    customSprites[input.id || '_preview'] = data;
    renderSprites();
    document.getElementById('filterSelect').value = input.id || '_preview';
    renderSprites();
}

function addCustom() {
    const input = readSvgInputs();
    if (!input.id) { alert('ID를 입력하세요'); return; }
    if (VEHICLE_IDS.includes(input.id)) { alert('기존 ID와 중복'); return; }
    const data = buildSpriteData(input);
    if (!data) { alert('SVG를 하나 이상 입력하세요'); return; }
    customSprites[input.id] = data;
    renderSprites();
    document.getElementById('filterSelect').value = input.id;
    renderSprites();
}

function removeCustom(id) {
    delete customSprites[id];
    document.getElementById('filterSelect').value = 'all';
    renderSprites();
}

function parseCode(raw) {
    const results = [];
    const idPattern = /['"](\w+)['"]\s*:\s*\{/g;
    let m; const positions = [];
    while ((m = idPattern.exec(raw)) !== null) positions.push({ id: m[1], start: m.index, braceStart: m.index + m[0].length });
    if (!positions.length) return results;

    for (let i = 0; i < positions.length; i++) {
        const { id, braceStart } = positions[i];
        const end = i + 1 < positions.length ? positions[i + 1].start : raw.length;
        const chunk = raw.substring(braceStart, end);
        const data = {};
        ['run', 'rest'].forEach(state => {
            const sm = new RegExp(state + '\\s*:\\s*\\{').exec(chunk);
            if (!sm) return;
            const after = chunk.substring(sm.index);
            const frames = {};
            ['frame1', 'frame2'].forEach(fr => {
                const fm = new RegExp(fr + '\\s*:\\s*`([\\s\\S]*?)`').exec(after);
                if (fm) frames[fr] = fm[1].trim();
            });
            if (frames.frame1 || frames.frame2) data[state] = { frame1: frames.frame1 || frames.frame2, frame2: frames.frame2 || frames.frame1 };
        });
        if (data.run || data.rest) results.push({ id, data });
    }
    return results;
}

function previewCode() {
    const parsed = parseCode(document.getElementById('codeInput').value);
    if (!parsed.length) { alert('파싱 실패'); return; }
    parsed.forEach(({ id, data }) => { customSprites[id] = data; });
    renderSprites();
    if (parsed.length === 1) { document.getElementById('filterSelect').value = parsed[0].id; renderSprites(); }
}

function addCode() { previewCode(); }

function exportCustom() {
    const input = readSvgInputs();
    if (!input.id) { alert('ID를 입력하세요'); return; }
    let code = `        '${input.id}': {\n`;
    if (input.run.frame1 || input.run.frame2) {
        code += `            run: {\n                frame1: \`${input.run.frame1 || input.run.frame2}\`,\n                frame2: \`${input.run.frame2 || input.run.frame1}\`\n            }`;
        if (input.rest.frame1 || input.rest.frame2) code += ',';
        code += '\n';
    }
    if (input.rest.frame1 || input.rest.frame2) {
        code += `            rest: {\n                frame1: \`${input.rest.frame1 || input.rest.frame2}\`,\n                frame2: \`${input.rest.frame2 || input.rest.frame1}\`\n            }\n`;
    }
    code += `        },`;
    navigator.clipboard.writeText(code).then(() => alert('클립보드에 복사됨')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = code;
        ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;height:300px;z-index:9999;background:#0a0a1a;color:#eee;font-family:monospace;font-size:12px;padding:12px;border:2px solid #ffd700;border-radius:8px;';
        document.body.appendChild(ta); ta.select();
        ta.addEventListener('blur', () => ta.remove());
    });
}
