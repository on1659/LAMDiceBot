      function initDebugPanel() {
        const ids = ['dbgStartX', 'dbgStartY', 'dbgFinishX', 'dbgFinishY',
                     'dbgStartXNum', 'dbgStartYNum', 'dbgFinishXNum', 'dbgFinishYNum',
                     'dbgEntryDx', 'dbgEntryDy', 'dbgExitDx', 'dbgExitDy',
                     'dbgEntryDxNum', 'dbgEntryDyNum', 'dbgExitDxNum', 'dbgExitDyNum',
                     'dbgRowDx', 'dbgRowDy', 'dbgTileW', 'dbgTileH',
                     'dbgRowDxNum', 'dbgRowDyNum', 'dbgTileWNum', 'dbgTileHNum',
                     'dbgTileRot', 'dbgTileRotNum',
                     'dbgStartRot', 'dbgStartRotNum',
                     'dbgFinishRot', 'dbgFinishRotNum',
                     'dbgFootY', 'dbgFootYNum'];
        ids.forEach((id) => {
          document.getElementById(id).addEventListener('input', (e) => {
            syncDebugInputs(id, e.target.value);
            applyOffsets();
          });
        });
        // Dimetric Snap: row 슬로프와 평행한 column step이 되도록 exitOffset 자동 보정
        document.getElementById('dbgSnapBtn').addEventListener('click', () => {
          const rs = layout.rowStep;
          if (rs.x === 0) return;
          const rowSlope = rs.y / rs.x;                      // 예: +0.521
          const cs = layout.bridge.columnStep;
          const magn = Math.sqrt(cs.x * cs.x + cs.y * cs.y); // 현재 column step 길이 유지
          const dirX = cs.x >= 0 ? 1 : -1;                   // 좌→우 진행 부호
          // 새 column step: |magn|, slope = -rowSlope
          const newColX = (dirX * magn) / Math.sqrt(1 + rowSlope * rowSlope);
          const newColY = -newColX * rowSlope;
          // 새 exit = entrance + newColumnStep × (columnCount - 1)
          const cnt = layout.bridge.columnCount - 1;
          const newExitX = layout.bridge.entrance.x + newColX * cnt;
          const newExitY = layout.bridge.entrance.y + newColY * cnt;
          // exit = midpoint(finish.LEFT, finish.BOTTOM) + exitOffset
          const fc = layout.finishPlatform.corners;
          const exitMidX = (fc.left.x + fc.bottom.x) / 2;
          const exitMidY = (fc.left.y + fc.bottom.y) / 2;
          const newOffsetX = Math.round(newExitX - exitMidX);
          const newOffsetY = Math.round(newExitY - exitMidY);
          document.getElementById('dbgExitDx').value = newOffsetX;
          document.getElementById('dbgExitDxNum').value = newOffsetX;
          document.getElementById('dbgExitDy').value = newOffsetY;
          document.getElementById('dbgExitDyNum').value = newOffsetY;
          applyOffsets();
        });

        document.getElementById('dbgCopyBtn').addEventListener('click', () => {
          const sw = layout.startWorld;
          const fw = layout.finishWorld;
          const eo = layout.entranceOffset;
          const xo = layout.exitOffset;
          const rs = layout.rowStep;
          const ts = layout.tileSize;
          const code = [
            `const startWorld     = { x: ${sw.x}, y: ${sw.y} };`,
            `const finishWorld    = { x: ${fw.x}, y: ${fw.y} };`,
            `const entranceOffset = { x: ${eo.x}, y: ${eo.y} };`,
            `const exitOffset     = { x: ${xo.x}, y: ${xo.y} };`,
            `const rowStep        = { x: ${rs.x}, y: ${rs.y} };`,
            `const tileSize       = { w: ${ts.w}, h: ${ts.h} };`,
            `const tileRotation        = ${layout.tileRotation};`,
            `const startStageRotation  = ${layout.startStageRotation};`,
            `const finishStageRotation = ${layout.finishStageRotation};`,
            `const charFootOffset      = ${layout.charFootOffset};`,
          ].join('\n');
          document.getElementById('dbgCodeOut').value = code;
          navigator.clipboard.writeText(code).catch(() => {});
        });
        updateDebugInfo();
      }

      function drawDebugMarkers() {
        if (!debug.mode) return;
        ctx.save();
        ctx.font = '14px sans-serif';
        ctx.lineWidth = 2;

        // start corners (핑크-빨강)
        ctx.fillStyle = '#ff5cc8';
        ctx.strokeStyle = '#ff5cc8';
        Object.entries(layout.startPlatform.corners).forEach(([name, c]) => {
          ctx.beginPath();
          ctx.arc(c.x, c.y, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillText(name.toUpperCase(), c.x + 8, c.y - 8);
        });

        // finish corners (파랑)
        ctx.fillStyle = '#42edff';
        ctx.strokeStyle = '#42edff';
        Object.entries(layout.finishPlatform.corners).forEach(([name, c]) => {
          ctx.beginPath();
          ctx.arc(c.x, c.y, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillText(name.toUpperCase(), c.x + 8, c.y - 8);
        });

        // bridge entrance/exit (녹색 X)
        ctx.strokeStyle = '#7cf08a';
        ctx.lineWidth = 3;
        [layout.bridge.entrance, layout.bridge.exit].forEach((p) => {
          ctx.beginPath();
          ctx.moveTo(p.x - 8, p.y - 8);
          ctx.lineTo(p.x + 8, p.y + 8);
          ctx.moveTo(p.x + 8, p.y - 8);
          ctx.lineTo(p.x - 8, p.y + 8);
          ctx.stroke();
        });

        // waitingSlots / finishSlots (노랑)
        ctx.fillStyle = '#ffd86b';
        layout.waitingSlots.forEach((s) => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, 4, 0, Math.PI * 2);
          ctx.fill();
        });
        layout.finishSlots.forEach((s) => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, 4, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.restore();
      }

      function pushEvent(text) {
        state.events.unshift(text);
        state.events = state.events.slice(0, 8);
        updateTextPanels();
      }

      /**
       * 서버 gameStart broadcast 데이터로 시나리오 재생을 시작한다.
       * mulberry32 / Math.random / randItem 호출 없음 — 모든 결정은 서버 broadcast 데이터.
       */
      function startScenarioReplay(data) {
        const { passerIndex, activeColors, allBets, safeRows, scenarios } = data;

        // 서버 데이터를 state에 저장
        state.safeRows = safeRows;
        state.scenarios = scenarios;
        state.activeColors = activeColors;
        state.allBets = allBets;

        // revealed 초기화
        state.revealed = Array.from({ length: layout.columnCount }, () => ({ safe: null, broken: null }));

        // 전체 6명 PlayerActor 생성 (비활성 포함) — 시작 plat에 배치
        state.allPlayers = allPlayerDefs.map((def, i) => new PlayerActor(def, i, layout));

        // 활성 캐릭터만 (베팅된 색 오름차순) → 도전 플레이어 목록
        state.players = activeColors.map((colorIdx) => {
          return state.allPlayers[colorIdx];
        });

        state.currentScenarioIndex = 0;
        state.currentIndex = -1;
        state.current = null;
        state.pendingChoice = null;
        state.timer = 0.5;
        state.elapsed = 0;
        state.winner = null;
        state.paused = false;
        state.mode = 'playing';
        state.phase = 'next-player';
        state.avatar.reset(layout.entrance());
        state.events = ['다리 건너기 시작!'];
        updateTextPanels();
      }

      function getKnownPathLength() {
        let length = 0;
        for (const item of state.revealed) {
          if (!item.safe) break;
          length += 1;
        }
        return length;
      }

      function nextActivePlayer() {
        for (let i = state.currentIndex + 1; i < state.players.length; i += 1) {
          if (state.players[i].status === 'waiting') return i;
        }
        return -1;
      }

      function beginPlayer(index) {
        state.currentIndex = index;
        state.current = state.players[index];
        state.current.resetForRun();
        state.avatar.reset(state.current.slot);
        state.phase = 'enter-bridge';
        moveAvatar(layout.entrance(), 0.55, { jumpHeight: 0, anchorOffset: 0 });
        pushEvent(`${state.current.name} steps up.`);
      }

      function moveAvatar(point, duration, options = {}) {
        state.avatar.moveTo(point, duration, options);
        state.timer = duration;
      }

      function revealChoice(player, col, choice) {
        const safe = state.safeRows[col];
        const success = choice === safe;
        const broken = success ? (safe === 'top' ? 'bottom' : 'top') : choice;
        state.revealed[col] = { safe, broken };
        player.choiceLog.push({ col, choice, success });
        return success;
      }

      function finishGame(winner) {
        state.winner = winner || state.players.slice().sort((a, b) => b.progress - a.progress)[0] || null;
        if (state.winner) {
          state.winner.status = 'winner';
          state.winner.animator.set('result', true);
        }
        state.current = null;
        state.phase = 'finished';
        state.mode = 'finished';
        pushEvent(`${state.winner ? state.winner.name : '—'} 통과!`);
        updateTextPanels();
      }

      function update(dt) {
        if (state.mode === 'loading' || state.paused) return;
        state.elapsed += dt;
        // 전체 6명 animator 업데이트 (비활성도 idle bob 처리)
        const animPlayers = state.allPlayers.length ? state.allPlayers : state.players;
        for (const player of animPlayers) player.animator.update(dt);
        state.avatar.update(dt);

        if (state.current) {
          if (state.phase === 'falling') state.current.animator.set('fall');
          else if (state.phase === 'enter-bridge') state.current.animator.set('run');
          else if (state.avatar.t < 1) state.current.animator.set('jump');
          else if (state.phase === 'safe-flash') state.current.animator.set('land');
          else state.current.animator.set('run');
        }

        state.timer -= dt;
        if (state.timer > 0) return;

        switch (state.phase) {
          case 'next-player': {
            const next = nextActivePlayer();
            if (next === -1) finishGame(null);
            else beginPlayer(next);
            break;
          }
          case 'enter-bridge':
            state.phase = 'walk-known';
            state.timer = 0.08;
            break;
          case 'walk-known': {
            const player = state.current;
            const known = getKnownPathLength();
            if (!player) break;
            if (player.progress < known) {
              const col = player.progress;
              const row = state.revealed[col].safe;
              moveAvatar(layout.tileCenter(col, row), 0.48, { jumpHeight: 42 });
              if (window.SoundManager) SoundManager.playSound('bridge-cross_step');
              player.progress += 1;
              state.phase = 'walk-known-wait';
            } else {
              state.phase = 'choose';
              state.timer = 0.35;
            }
            break;
          }
          case 'walk-known-wait':
            state.phase = 'walk-known';
            state.timer = 0.08;
            break;
          case 'choose': {
            const player = state.current;
            const col = player.progress;
            if (col >= layout.columnCount) {
              player.status = 'finished';
              player.animator.set('result', true);
              moveAvatar(layout.finishSlot(0), 0.7, { jumpHeight: 46, anchorOffset: 0 });
              state.phase = 'finish-wait';
              break;
            }
            // 서버 시나리오에서 이 column의 선택 row를 결정 — Math.random 0회
            const scenario = state.scenarios[state.currentScenarioIndex];
            let choice;
            if (!scenario) {
              // 시나리오 범위 초과 (안전 fallback — 도달하면 안 됨)
              choice = state.safeRows[col] || 'top';
            } else if (scenario.success) {
              // 통과자 — 이 column은 안전 row로 진행
              choice = state.safeRows[col];
            } else if (col === scenario.failColumn) {
              // 이 column에서 실패하는 시나리오
              choice = scenario.failRow;
            } else {
              // 앞 캐릭터들이 공개한 안전 row 따라감
              choice = state.safeRows[col];
            }
            state.pendingChoice = { col, row: choice };
            moveAvatar(layout.tileCenter(col, choice), 0.68, { jumpHeight: 70 });
            state.phase = 'choice-wait';
            if (window.SoundManager) SoundManager.playSound('bridge-cross_crack');
            pushEvent(`${player.name}이(가) ${col + 1}번 열에 도전.`);
            break;
          }
          case 'choice-wait': {
            const player = state.current;
            const { col, row } = state.pendingChoice;
            // 서버 시나리오로 성공/실패 결정 — 클라이언트 판정 없음
            const scenario = state.scenarios[state.currentScenarioIndex];
            let success;
            if (!scenario) {
              success = true; // 안전 fallback
            } else if (scenario.success) {
              success = true;
            } else {
              success = (col !== scenario.failColumn);
            }
            revealChoice(player, col, row);
            if (success) {
              player.progress += 1;
              pushEvent(`${player.name}: ${col + 1}번 열 통과.`);
              state.pendingChoice = null;
              state.phase = 'safe-flash';
              state.timer = 0.42;
              if (window.SoundManager) SoundManager.playSound('bridge-cross_safe');
            } else {
              player.fallsAt = col + 1;
              player.status = 'fallen';
              pushEvent(`${player.name}: ${col + 1}번 열에서 추락! 안전 발판 공개.`);
              state.phase = 'falling';
              state.timer = 0.92;
              if (window.SoundManager) { SoundManager.playSound('bridge-cross_break'); SoundManager.playSound('bridge-cross_fall'); }
            }
            updateTextPanels();
            break;
          }
          case 'safe-flash':
            if (state.current.progress >= layout.columnCount) {
              state.current.status = 'finished';
              state.current.animator.set('result', true);
              moveAvatar(layout.finishSlot(0), 0.7, { jumpHeight: 46, anchorOffset: 0 });
              state.phase = 'finish-wait';
            } else {
              state.phase = 'choose';
              state.timer = 0.2;
            }
            break;
          case 'falling':
            // 이 캐릭터의 시나리오 처리 완료 → 다음 시나리오로
            state.currentScenarioIndex += 1;
            state.current = null;
            state.pendingChoice = null;
            state.phase = 'next-player';
            state.timer = 0.45;
            break;
          case 'finish-wait':
            // 통과자 시나리오 처리 완료
            state.currentScenarioIndex += 1;
            finishGame(state.current);
            break;
          default:
            break;
        }
      }

      function sheetCell(image, sheet, row, col) {
        const cellW = Math.floor(image.naturalWidth / sheet.columns);
        const cellH = Math.floor(image.naturalHeight / sheet.rows);
        return {
          sx: col * cellW,
          sy: row * cellH,
          sw: cellW,
          sh: cellH,
        };
      }

      function fxFrame(name) {
        const image = images.glassFx;
        const anim = fxSheet.animations[name];
        const frame = anim.frames[Math.floor(state.elapsed * anim.fps) % anim.frames.length];
        return sheetCell(image, fxSheet, anim.row, frame);
      }

      function drawImageCell(image, cell, x, y, w, h, alpha = 1) {
        if (!image) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.drawImage(image, cell.sx, cell.sy, cell.sw, cell.sh, x, y, w, h);
        ctx.restore();
      }

      function fxUsesContactAnchor() {
        return Math.abs(fxSheet.anchor.x - playerSheet.anchor.x) < 0.001
          && Math.abs(fxSheet.anchor.y - playerSheet.anchor.y) < 0.001;
      }

      function tileFxRect(center) {
        const size = { w: layout.tileW, h: layout.tileH };
        const anchor = fxUsesContactAnchor() ? fxSheet.anchor : { x: 0.5, y: 0.5 };
        return {
          x: center.x - size.w * anchor.x,
          y: center.y - size.h * anchor.y,
          w: size.w,
          h: size.h,
          anchor,
        };
      }

      function drawTile(col, row) {
        const info = state.revealed[col];
        const center = layout.tileCenter(col, row);
        const rect = tileFxRect(center);
        const pending = state.pendingChoice && state.pendingChoice.col === col && state.pendingChoice.row === row;
        const lastSafe = state.current && state.current.progress === col + 1 && info.safe === row;

        let fxName = 'safe_sparkle';
        let frameOverride = 0;
        let alpha = 0.9;
        if (info.broken === row) {
          fxName = 'break_shards';
          frameOverride = 1;
          alpha = 0.95;
        } else if (info.safe === row) {
          fxName = lastSafe && state.phase === 'safe-flash' ? 'safe_sparkle' : 'safe_sparkle';
          frameOverride = lastSafe ? null : 0;
          alpha = 1;
        } else if (pending) {
          fxName = 'warning_glow';
          frameOverride = null;
          alpha = 1;
        }

        const image = images.glassFx;
        const anim = fxSheet.animations[fxName];
        const frame = frameOverride === null
          ? anim.frames[Math.floor(state.elapsed * anim.fps) % anim.frames.length]
          : frameOverride;
        const cell = sheetCell(image, fxSheet, anim.row, frame);
        const rotation = layout.tileRotation || 0;
        if (rotation !== 0) {
          ctx.save();
          const pivotX = rect.x + rect.w * rect.anchor.x;
          const pivotY = rect.y + rect.h * rect.anchor.y;
          ctx.translate(pivotX, pivotY);
          ctx.rotate(rotation * Math.PI / 180);
          ctx.translate(-pivotX, -pivotY);
          drawImageCell(image, cell, rect.x, rect.y, rect.w, rect.h, alpha);
          ctx.restore();
        } else {
          drawImageCell(image, cell, rect.x, rect.y, rect.w, rect.h, alpha);
        }
      }

      function drawPlayer(player, x, y, scale = 0.34, alpha = 1, falling = false, dim = false) {
        if (dim) alpha *= 0.35;
        const image = images[`player_${player.color}`];
        const anim = falling ? 'fall' : player.animator.animName;
        const row = playerSheet.animations[anim].row;
        const col = player.animator.frame(playerSheet);
        const cell = sheetCell(image, playerSheet, row, col);
        const w = cell.sw * scale;
        const h = cell.sh * scale;
        // 살아있는 느낌의 idle bob — 캐릭터별 phase 분산 (player.id), 진폭 키우고 horizontal도 추가
        const isIdle = !falling && (player.status === 'waiting' || player.status === 'finished' || player.status === 'winner');
        const bobX = isIdle ? Math.sin(state.elapsed * 2.3 + player.id * 1.7) * 1.5 : 0;
        const bobY = isIdle ? Math.sin(state.elapsed * 4.5 + player.id) * 5 : 0;

        ctx.save();
        ctx.globalAlpha = alpha;
        if (falling) {
          const fallT = 1 - Math.max(0, state.timer) / 0.92;
          const fallY = y + fallT * 150;
          const fallX = x + Math.sin(fallT * Math.PI) * 20;
          const trail = fxFrame('fall_trail');
          drawImageCell(images.glassFx, trail, fallX - 48, fallY - 64, 96, 110, 0.8 * (1 - fallT * 0.35));
          ctx.translate(fallX, fallY);
          ctx.rotate(0.25 + fallT * 0.8);
          ctx.globalAlpha = alpha * Math.max(0.16, 1 - fallT * 0.78);
          ctx.drawImage(image, cell.sx, cell.sy, cell.sw, cell.sh, -w * playerSheet.anchor.x, -h * playerSheet.anchor.y, w, h);
        } else {
          ctx.drawImage(image, cell.sx, cell.sy, cell.sw, cell.sh, x - w * playerSheet.anchor.x + bobX, y - h * playerSheet.anchor.y + bobY, w, h);
        }
        ctx.restore();
      }

      // 자산 가운데 기준 회전 적용한 stage drawImage
      function drawStageImage(image, world, size, rotationDeg) {
        if (rotationDeg === 0) {
          ctx.drawImage(image, world.x, world.y, size.w, size.h);
          return;
        }
        ctx.save();
        const cx = world.x + size.w / 2;
        const cy = world.y + size.h / 2;
        ctx.translate(cx, cy);
        ctx.rotate(rotationDeg * Math.PI / 180);
        ctx.translate(-cx, -cy);
        ctx.drawImage(image, world.x, world.y, size.w, size.h);
        ctx.restore();
      }

      function drawBackground() {
        // background-void-v2 2회: (0,0) + (864,0) — world 좌표, 원본 크기 그대로
        if (images.bg) {
          ctx.drawImage(images.bg, 0, 0, 1536, 1024);
          ctx.drawImage(images.bg, 864, 0, 1536, 1024);
        }
        // start-stage: crop 후 자산 크기(728×743), world 배치 위치는 layout.startWorld
        if (images.startStage) {
          drawStageImage(images.startStage, layout.startWorld, layout.startSize, layout.startStageRotation || 0);
        }
        // finish-stage: crop 후 자산 크기(559×794), world 배치 위치는 layout.finishWorld
        if (images.finishStage) {
          drawStageImage(images.finishStage, layout.finishWorld, layout.finishSize, layout.finishStageRotation || 0);
        }
      }

      function drawScreenAtmosphere() {
        // viewport 좌표 고정 atmosphere — camera 이동과 무관하게 화면에 고정
        // 중심 X: viewport.w / 2, 중심 Y: viewport.h × 0.18 (상단 1/5 지점)
        const cx = viewport.w / 2;
        const cy = viewport.h * 0.18;
        const grad = ctx.createRadialGradient(cx, cy, viewport.w * 0.08, cx, viewport.h * 0.6, viewport.w * 0.8);
        grad.addColorStop(0, 'rgba(31, 45, 112, 0.2)');
        grad.addColorStop(0.62, 'rgba(3, 5, 17, 0.16)');
        grad.addColorStop(1, 'rgba(2, 3, 11, 0.58)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, viewport.w, viewport.h);
      }

      function drawAvatarShadow() {
        if (!state.current || state.phase === 'falling') return;
        const airborne = state.avatar.t < 1 ? Math.sin(Math.PI * state.avatar.t) : 0;
        ctx.save();
        ctx.fillStyle = `rgba(0, 0, 0, ${0.34 * (1 - airborne * 0.45)})`;
        ctx.beginPath();
        ctx.ellipse(state.avatar.groundX, state.avatar.groundY - 8, 32 * (1 - airborne * 0.35), 12, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawJumpTrail() {
        if (!state.current || state.phase === 'falling' || state.phase === 'enter-bridge' || state.avatar.t >= 1) return;
        ctx.save();
        for (let i = 0; i < 4; i += 1) {
          const lag = Math.max(0, state.avatar.t - (i + 1) * 0.08);
          const eased = lag < 0.5 ? 2 * lag * lag : 1 - Math.pow(-2 * lag + 2, 2) / 2;
          const x = state.avatar.fromX + (state.avatar.toX - state.avatar.fromX) * eased;
          const y = state.avatar.fromY + (state.avatar.toY - state.avatar.fromY) * eased - Math.sin(Math.PI * lag) * state.avatar.jumpHeight;
          const size = 7 - i;
          ctx.globalAlpha = 0.42 - i * 0.07;
          ctx.fillStyle = i % 2 === 0 ? '#42edff' : '#fff2a8';
          ctx.fillRect(Math.round(x - size / 2), Math.round(y - 42 - size / 2), size, size);
        }
        ctx.restore();
      }

      function drawLandingPulse() {
        if (!state.current || state.avatar.landPulse <= 0 || state.phase === 'falling') return;
        const t = 1 - state.avatar.landPulse / 0.28;
        const cell = fxFrame('landing_pulse');
        const size = 86 + t * 34;
        drawImageCell(images.glassFx, cell, state.avatar.groundX - size / 2, state.avatar.groundY - size * 0.72, size, size, 0.78 * (1 - t * 0.4));
      }

      function drawHud() {
        // HUD는 screen-space (camera 밖) — viewport 1024×683 기준 좌표
        // 원본 1536×1024 기준 → 0.667 스케일 적용
        ctx.save();
        ctx.fillStyle = 'rgba(4, 7, 22, 0.7)';
        ctx.strokeStyle = 'rgba(75, 235, 255, 0.28)';
        ctx.lineWidth = 2;
        // 좌상 패널: 원본 (36,30,510,112) → (24,20,340,75)
        roundedRect(24, 20, 340, 75, 9);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#f8fbff';
        ctx.font = '900 23px Segoe UI, sans-serif';
        ctx.fillText('Bridge Cross', 41, 51);
        ctx.fillStyle = '#a8b7d0';
        ctx.font = '700 12px Segoe UI, sans-serif';
        const label = state.phase === 'finished'
          ? `통과: ${state.winner ? state.winner.name : '-'}`
          : state.current
            ? `도전 중: ${state.current.name}`
            : state.mode === 'playing'
              ? '다음 도전자 대기'
              : '대기';
        ctx.fillText(label, 43, 75);

        ctx.fillStyle = 'rgba(4, 7, 22, 0.7)';
        // 우상 패널: 원본 (1114,30,376,92) → (744,20,251,61)
        roundedRect(744, 20, 251, 61, 9);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#42edff';
        ctx.font = '900 12px Segoe UI, sans-serif';
        const knownCols = getKnownPathLength();
        ctx.fillText(`열 ${knownCols} / ${layout.columnCount}`, 760, 44);
        ctx.fillStyle = '#a8b7d0';
        ctx.font = '700 10px Segoe UI, sans-serif';
        const activeStr = state.activeColors.length > 0
          ? `활성: ${state.activeColors.length}명`
          : '';
        ctx.fillText(activeStr, 760, 64);
        ctx.restore();
      }

      function roundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function render() {
        // Screen clear (viewport 좌표)
        ctx.clearRect(0, 0, viewport.w, viewport.h);
        ctx.fillStyle = '#030511';
        ctx.fillRect(0, 0, viewport.w, viewport.h);

        // World draws (camera transform 적용)
        camera.apply(ctx);

        drawBackground();

        for (let col = 0; col < layout.columnCount; col += 1) {
          drawTile(col, 'top');
          drawTile(col, 'bottom');
        }

        // 비활성 캐릭터(베팅 없음): 시작 plat에 dim으로 표시
        const activeColorSet = new Set(state.activeColors);
        if (state.allPlayers.length > 0) {
          state.allPlayers.forEach((player) => {
            const isDim = activeColorSet.size > 0 && !activeColorSet.has(player.colorIndex);
            if (isDim && player.status === 'waiting') {
              drawPlayer(player, player.slot.x, player.slot.y, 0.66, 0.96, false, true);
            }
          });
        }

        state.players.filter((p) => p.status === 'waiting').forEach((player) => {
          drawPlayer(player, player.slot.x, player.slot.y, 0.66, 0.96);
        });

        state.players.filter((p) => p.status === 'fallen').forEach((player) => {
          const col = Math.max(0, (player.fallsAt || 1) - 1);
          const row = state.revealed[col].broken || 'bottom';
          const pos = layout.tileCenter(col, row);
          const cell = fxFrame('break_shards');
          drawImageCell(images.glassFx, cell, pos.x - 58, pos.y + 6, 116, 116, 0.34);
        });

        state.players.filter((p) => p !== state.current && (p.status === 'finished' || p.status === 'winner')).forEach((player, index) => {
          const slot = layout.finishSlot(index);
          drawPlayer(player, slot.x, slot.y, 0.66, 1);
        });

        if (state.current) {
          const falling = state.phase === 'falling';
          drawAvatarShadow();
          drawLandingPulse();
          drawJumpTrail();
          drawPlayer(state.current, state.avatar.x, state.avatar.y, 0.78, 1, falling);
        }

        if (state.phase === 'falling' && state.pendingChoice) {
          const pos = layout.tileCenter(state.pendingChoice.col, state.pendingChoice.row);
          const warning = fxFrame('warning_glow');
          const tw = layout.tileSize.w;
          const th = layout.tileSize.h;
          drawImageCell(images.glassFx, warning, pos.x - tw / 2, pos.y - th / 2, tw, th, 0.9);
        }

        drawDebugMarkers();

        camera.release(ctx);

        // Screen-space atmosphere (viewport 고정, camera 이동과 무관)
        drawScreenAtmosphere();

        // HUD (screen-space, camera 밖)
        drawHud();
      }

      function updateTextPanels() {
        document.getElementById('ticker').innerHTML = state.events
          .map((event) => `<li>${escapeHtml(event)}</li>`)
          .join('');
        document.getElementById('ranking').innerHTML = state.players
          .map((player, index) => `<li><strong>${index + 1}. ${escapeHtml(player.name)}</strong> - ${escapeHtml(player.status)} - ${player.progress}/${layout.columnCount}</li>`)
          .join('');
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function loop(now) {
        const dt = Math.min(0.05, (now - (loop.last || now)) / 1000);
        loop.last = now;
        update(dt);
        cameraDirector.update(state);
        camera.update(dt, userZoomController.value);
        render();
        requestAnimationFrame(loop);
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinateSystem: 'world 2400x1024, viewport 1024x683, origin top-left, x right, y down',
          mode: state.mode,
          phase: state.phase,
          paused: state.paused,
          activeColors: state.activeColors,
          activePlayer: state.current ? state.current.name : null,
          activeColor: state.current ? state.current.color : null,
          avatar: {
            x: Math.round(state.avatar.x),
            y: Math.round(state.avatar.y),
            groundX: Math.round(state.avatar.groundX),
            groundY: Math.round(state.avatar.groundY),
            jumpT: Number(state.avatar.t.toFixed(2)),
          },
          knownColumns: getKnownPathLength(),
          revealed: state.revealed.map((item, index) => ({
            column: index + 1,
            safe: item.safe,
            broken: item.broken,
          })),
          players: state.players.map((player) => ({
            name: player.name,
            color: player.color,
            status: player.status,
            progress: player.progress,
            fallsAt: player.fallsAt,
          })),
          pendingChoice: state.pendingChoice,
          winner: state.winner ? state.winner.name : null,
          layout: layout.debugPayload(),
          latestEvent: state.events[0],
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let i = 0; i < steps; i += 1) update(1 / 60);
        render();
      };

      // 게임 시작 버튼 — 호스트가 클릭하면 서버에 요청
      const startBtnEl = document.getElementById('startBtn');
      if (startBtnEl) {
        startBtnEl.addEventListener('click', () => {
          socket.emit('bridge-cross:start');
        });
      }

      // _onGameStart 콜백 등록 — Socket script 블록에서 호출됨
      window._onGameStart = function(data) {
        startScenarioReplay(data);
      };
      window._onGameEnd = function({ winnerColor, winners }) {
        // 게임 종료 시 시각 루프는 자연스럽게 finished 상태로 멈춤
        // (finishGame은 update()→finish-wait 케이스에서 이미 호출됨)
      };

      // Zoom UI — DOM floating controls
      function updateZoomDisplay() {
        document.getElementById('zoomValue').textContent = userZoomController.value.toFixed(1) + '×';
      }

      document.getElementById('zoomUi').addEventListener('click', (event) => {
        const btn = event.target.closest('button[data-zoom]');
        if (!btn) return;
        const action = btn.dataset.zoom;
        if (action === 'reset') {
          userZoomController.reset();
        } else {
          userZoomController.delta(parseFloat(action));
        }
        updateZoomDisplay();
      });

      // 마우스 휠: canvas hover 시에만 작동, 전역 페이지 스크롤 차단 안 함
      // deltaY 비례 매핑: 트랙패드(±4~10)와 마우스 휠(±100~400) 단위 차이 자동 흡수
      canvas.addEventListener('wheel', (event) => {
        event.preventDefault();
        userZoomController.delta(-event.deltaY * 0.001);
        updateZoomDisplay();
      }, { passive: false });

      window.addEventListener('keydown', (event) => {
        if (event.key.toLowerCase() === 'f') {
          if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
          else document.exitFullscreen().catch(() => {});
        }
        if (event.key.toLowerCase() === 'd') {
          if (!debugEnabled) return;
          debug.mode = !debug.mode;
          document.getElementById('debugPanel').hidden = !debug.mode;
          if (debug.mode) updateDebugInfo();
        }
        if (event.key === ' ') {
          event.preventDefault();
          // Space bar: 호스트면 게임 시작 emit
          if (window.isHost) socket.emit('bridge-cross:start');
        }
      });

      applySpriteManifest().then(() => Promise.all(Object.entries(imageDefs).map(([key, src]) => loadImage(key, src)))).then(() => {
        // Phase 3: resetGame 없음. 빈 캔버스 상태에서 시작, 서버 broadcast 대기
        state.mode = 'ready';
        state.phase = 'ready';
        state.allPlayers = allPlayerDefs.map((def, i) => new PlayerActor(def, i, layout));
        state.players = [];
        state.revealed = Array.from({ length: layout.columnCount }, () => ({ safe: null, broken: null }));
        state.events = ['방에 연결 중...'];
        updateTextPanels();
        if (debugEnabled) {
          document.getElementById('debugPanel').hidden = false;
          initDebugPanel();
        }
        requestAnimationFrame(loop);
      });
    })();
  </script>
</body>
</html>
